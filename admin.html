<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>쑥쑥 AI 어드민</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#3B6D11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="쑥쑥 어드민">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
:root{--ink:#1f2430;--sub:#6b7280;--line:#e6ece0;--bg:#f3f6ee;--card:#fff;--brand:#3B6D11;--brand-d:#2f5a0e;--good:#4e9a2f;--amber:#c98a00;--pur:#2f7d6b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
.wrap{max-width:1080px;margin:0 auto;padding:24px 18px 60px}
h1{font-size:22px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.logo{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:10px;background:linear-gradient(150deg,#4e8f1a,#3B6D11);color:#fff;font-size:17px;box-shadow:0 2px 6px rgba(59,109,17,.35)}
.top{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.top .sp{margin-left:auto;display:flex;gap:8px;align-items:center}
.muted{color:var(--sub);font-size:13px}
.btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 13px;font:inherit;font-size:13px;cursor:pointer;color:var(--ink);transition:background .12s,border-color .12s}
.btn:hover{background:#f2f7ec;border-color:#cfe0bb}
.btn.p{background:var(--brand);color:#fff;border:none;font-weight:700}
/* login */
#gate{position:fixed;inset:0;z-index:50;background:linear-gradient(160deg,#24450b,#3B6D11 60%,#5a8f2a);display:flex;align-items:center;justify-content:center;padding:20px}
#gate.hide{display:none}
.gcard{background:#fff;border-radius:18px;box-shadow:0 20px 50px rgba(0,0,0,.3);width:100%;max-width:380px;padding:26px}
.gcard .glogo{display:flex;justify-content:center;margin-bottom:10px}
.gcard .glogo span{display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:14px;background:linear-gradient(150deg,#4e8f1a,#3B6D11);color:#fff;font-size:24px;box-shadow:0 4px 12px rgba(59,109,17,.4)}
.gcard h2{font-size:19px;font-weight:800;text-align:center;margin-bottom:4px}
.gcard .s{font-size:12.5px;color:var(--sub);text-align:center;margin-bottom:18px}
.gcard input{width:100%;border:1px solid #d1d5db;border-radius:10px;padding:11px;font:inherit;font-size:15px;margin-bottom:11px}
.gcard input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(59,109,17,.12)}
.gcard button{width:100%;border:none;background:var(--brand);color:#fff;border-radius:10px;padding:12px;font:inherit;font-weight:800;cursor:pointer}
.gcard button:hover{background:var(--brand-d)}
.gmsg{font-size:12.5px;color:#dc2626;text-align:center;min-height:16px;margin-top:9px}
/* kpi */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}
.k{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 15px;box-shadow:0 1px 3px rgba(31,36,48,.05);border-top:3px solid var(--brand)}
.k.b{border-top-color:#3B6D11}.k.g{border-top-color:#4e9a2f}.k.a{border-top-color:#c98a00}.k.p{border-top-color:#2f7d6b}
.k .n{font-size:24px;font-weight:800;letter-spacing:-.02em}
.k .l{font-size:12px;color:var(--sub);margin-top:4px}
.k.b .n{color:var(--brand)}.k.g .n{color:var(--good)}.k.a .n{color:var(--amber)}.k.p .n{color:var(--pur)}
.k .spark{margin-top:9px;width:100%!important;height:36px!important;display:block}
.k .nospark{margin-top:9px;height:36px;display:flex;align-items:flex-end;font-size:11px;color:#c3c9d2}
.k.clickable{cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s}
.k.clickable:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(31,36,48,.10)}
.k.sel{border-color:#3B6D11;box-shadow:0 0 0 2px rgba(59,109,17,.14),0 6px 18px rgba(31,36,48,.10)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:0 1px 3px rgba(31,36,48,.05);margin-bottom:16px}
.panel h3{font-size:15px;font-weight:800;margin-bottom:12px;color:#2f4a17}
/* ===== 상세 추이 차트 ===== */
.ch-h{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.ch-h h3{margin-bottom:2px}
.ch-sub{font-size:12px;color:var(--sub)}
.ch-stats{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.ch-st{background:#f6faf0;border:1px solid #e2ecd5;border-radius:10px;padding:7px 11px;text-align:center;min-width:74px}
.ch-st .sv{font-size:14.5px;font-weight:800;color:#2f4a17;line-height:1.2;white-space:nowrap}
.ch-st .sl{font-size:10.5px;color:var(--sub);margin-top:2px}
.ch-st.up .sv{color:#15803d}.ch-st.down .sv{color:#dc2626}
.ch-chips{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0 8px;scrollbar-width:none}
.ch-chips::-webkit-scrollbar{display:none}
.chchip{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 13px;font:inherit;font-size:12.5px;font-weight:600;color:#4b5563;cursor:pointer;white-space:nowrap;transition:.12s}
.chchip:hover{border-color:#cfe0bb;background:#f8fbf4}
.chchip i{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.chchip.on{background:#3B6D11;border-color:#3B6D11;color:#fff;box-shadow:0 3px 10px rgba(59,109,17,.28)}
.chchip.on i{background:#fff!important}
.ch-canvas{position:relative;height:290px}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--sub);font-weight:600;font-size:11.5px;padding:7px 6px;border-bottom:1px solid var(--line)}
td{padding:8px 6px;border-bottom:1px solid #f1f3f6}
td.r,th.r{text-align:right}
.bar{height:7px;background:#eaf0e2;border-radius:20px;overflow:hidden;display:inline-block;width:90px;vertical-align:middle;margin-right:8px}
.bar span{display:block;height:100%;background:var(--brand);border-radius:20px}
.loading{color:var(--sub);font-size:14px;padding:40px;text-align:center}
/* 접기/펼치기 */
.fold-h{display:inline-flex;align-items:center;gap:7px;cursor:pointer;user-select:none;margin-bottom:0}
.fold-h:hover{color:#3B6D11}
.fold-h .caret{font-size:11px;color:var(--sub);transition:transform .18s}
.fold-h.closed .caret{transform:rotate(-90deg)}
.fold-body.closed{display:none}
.fold-hint{font-size:11.5px;color:var(--sub);font-weight:600;margin-left:2px}
/* 고객 원장 */
.cust-h{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
.cust-tools{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cust-tools input[type=text],#custSearch{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font:inherit;font-size:13px;width:200px}
.cust-chk{font-size:12.5px;color:var(--sub);display:flex;align-items:center;gap:5px;cursor:pointer}
.cust-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.cust-wrap.scroll{max-height:440px;overflow-y:auto}
table.ctab{width:100%;border-collapse:collapse;font-size:12.5px;white-space:nowrap}
table.ctab th{text-align:left;color:var(--sub);font-weight:600;font-size:11px;padding:8px 8px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}
table.ctab td{padding:8px 8px;border-bottom:1px solid #f1f3f6}
table.ctab td.r,table.ctab th.r{text-align:right}
table.ctab .ok{color:var(--good);font-weight:700}
table.ctab .muted{color:#b6bcc6}
/* 프로모 코드 */
.promo-form{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;margin-bottom:14px;padding:12px;background:#f6faf0;border:1px solid #e2ecd5;border-radius:12px}
.pf{display:flex;flex-direction:column;gap:3px}
.pf label{font-size:11px;color:var(--sub);font-weight:600}
.pf input,.pf select{border:1px solid var(--line);border-radius:8px;padding:8px 9px;font:inherit;font-size:13px;background:#fff}
.pf.code input{text-transform:uppercase;width:130px;font-weight:700}
.pf.val input{width:80px}.pf.mx input{width:80px}.pf.exp input{width:150px}.pf.note input{width:150px}
.promo-form .btn.p{align-self:flex-end}
.pmsg{font-size:12px;margin:2px 0 0;min-height:15px}.pmsg.ok{color:var(--good)}.pmsg.err{color:#dc2626}
.ptag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.ptag.on{background:#e6f2d8;color:#3B6D11}.ptag.off{background:#f1f3f6;color:#94a3b8}
.plink{color:#3B6D11;cursor:pointer;font-weight:600;font-size:12px}.plink.del{color:#dc2626}
@media(max-width:820px){.grid{grid-template-columns:repeat(2,1fr)}.cols{grid-template-columns:1fr}.cust-tools input,#custSearch{width:140px}}
/* ===== 모바일 최적화 (홈 화면 앱으로 사용) ===== */
@media(max-width:560px){
  .wrap{padding:calc(14px + env(safe-area-inset-top)) 12px calc(28px + env(safe-area-inset-bottom))}
  h1{font-size:19px}
  .logo{width:28px;height:28px;font-size:15px}
  .top{gap:8px}
  .top .sp{gap:6px}
  .btn{padding:7px 10px;font-size:12px}
  .grid{gap:9px;margin:14px 0}
  .k{padding:13px 11px;border-radius:12px}
  .k .n{font-size:20px}
  .k .l{font-size:11px}
  .k .spark,.k .nospark{height:30px!important;margin-top:7px}
  .panel{padding:15px 13px;border-radius:14px;margin-bottom:12px}
  .panel h3{font-size:14px}
  /* 차트: 세로 공간 확보 + 통계 가로 스크롤 */
  .ch-h{gap:8px}
  .ch-stats{margin-left:0;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;flex-wrap:nowrap;scrollbar-width:none}
  .ch-stats::-webkit-scrollbar{display:none}
  .ch-st{min-width:66px;padding:6px 9px}
  .ch-st .sv{font-size:13px}
  .chchip{padding:8px 12px;font-size:12px}
  .ch-canvas{height:230px}
  /* 표: 폰트/여백 축소 */
  table.ctab th,table.ctab td{padding:7px 6px;font-size:11.5px}
  .cust-wrap.scroll{max-height:340px}
  .promo-form{padding:10px;gap:7px}
  .pf.code input,.pf.exp input,.pf.note input{width:100%}
  .pf{flex:1 1 46%}
  .promo-form .btn.p{flex:1 1 100%}
}
</style>
</head>
<body>

<!-- 로그인 게이트 (어드민 전용) -->
<div id="gate">
  <div class="gcard">
    <div class="glogo"><span>🌱</span></div>
    <h2>쑥쑥 AI 어드민</h2>
    <div class="s">관리자 계정으로 로그인하세요</div>
    <input id="email" type="email" placeholder="관리자 이메일" autocomplete="email">
    <input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button id="loginBtn" type="button">로그인</button>
    <div class="gmsg" id="gmsg"></div>
  </div>
</div>

<div class="wrap">
  <div class="top">
    <h1><span class="logo">🌱</span> 쑥쑥 AI 어드민</h1>
    <div class="sp">
      <span class="muted" id="who"></span>
      <button class="btn" id="reload" type="button">새로고침</button>
      <button class="btn" id="logout" type="button">로그아웃</button>
    </div>
  </div>
  <div class="muted">세일즈 거절극복 훈련 · 운영 지표</div>

  <div id="content"><div class="loading">로그인 후 데이터를 불러옵니다…</div></div>
</div>

<script>
/* ===== 설정 ===== 앱과 동일한 Supabase 값 (anon은 공개 안전) */
const SUPABASE_URL="https://pzotfitbuxwoaenvdfju.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6b3RmaXRidXh3b2FlbnZkZmp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5OTU4ODksImV4cCI6MjA5OTU3MTg4OX0.A-2Buu9hKLW_2ORgxFfMQcL9u9vzKLWZBf3R4v0XAQc";
const ADMIN_ENDPOINT="/.netlify/functions/admin-stats";
const PROMO_ENDPOINT="/.netlify/functions/admin-promo";

const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
let chart=null, sparks=[], CUST=[];

/* 앱 단계(스테이지) → 이탈 페이지 한글 라벨 (퍼널 순서 표기) */
const STAGE_LABELS={
  landing:"① 랜딩(광고 유입)", service_intro:"서비스 소개(로그인)",
  login:"② 로그인 화면", signup:"② 회원가입 화면", phone_verify:"② 휴대폰 인증",
  persona_select:"③ 고객 선택", coldness_select:"④ 거절 강도 선택",
  ranking:"🏆 랭킹 화면", home:"🏠 홈",
  chat:"⑤ 대화(훈련 중)", report:"⑥ 리포트",
  account:"내 계정", paywall:"구독 안내(페이월)"
};
function stageLabel(p){ if(STAGE_LABELS[p]) return STAGE_LABELS[p]; if(p==="/"||p==="/index.html"||p==="/index") return "(구버전·미분류)"; return esc(p); }
const CARD_COLOR={b:"#3B6D11",g:"#4e9a2f",a:"#c98a00",p:"#2f7d6b","":"#64748b"};
function hexA(hex,a){ var n=parseInt(hex.slice(1),16); return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")"; }

function won(n){ return (n||0).toLocaleString('ko-KR')+"원"; }
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function fmtDur(sec){ sec=+sec||0; if(sec<60)return sec+"초"; var m=Math.floor(sec/60),s=sec%60; return m+"분 "+s+"초"; }

async function loadStats(){
  $("content").innerHTML='<div class="loading">불러오는 중…</div>';
  var sess=(await sb.auth.getSession()).data.session;
  if(!sess){ showGate(); return; }
  try{
    var r=await fetch(ADMIN_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({accessToken:sess.access_token})});
    var j=await r.json();
    if(r.status===401||(j&&j.error==='auth_failed')){ try{ await sb.auth.signOut(); }catch(e){} $("who").textContent=''; showGate(); $("gmsg").textContent='세션이 만료됐어요. 다시 로그인해 주세요.'; return; }
    if(r.status===403){ $("content").innerHTML='<div class="loading">이 계정은 관리자가 아닙니다. (ADMIN_EMAIL 환경변수와 로그인 계정을 확인하세요)</div>'; return; }
    if(!r.ok||!j.ok){ $("content").innerHTML='<div class="loading">데이터를 불러오지 못했습니다: '+esc((j&&j.error)||('HTTP '+r.status))+'</div>'; return; }
    render(j);
  }catch(e){ $("content").innerHTML='<div class="loading">서버 연결 오류. 배포 사이트에서 실행하세요.</div>'; }
}

function render(j){
  var k=j.kpi||{}, S=j.series||{}, sdays=S.days||[];
  // 카드 정의: s=시계열 키(있으면 카드에 스파크라인), t=차트 타입
  var cards=[
    {label:"방문자(순)", val:k.visitors||0, cls:"b", s:"visitors", t:"line"},
    {label:"페이지뷰", val:k.totalPageviews||0, cls:"", s:"pageviews", t:"line"},
    {label:"훈련 세션", val:k.totalSessions||0, cls:"g", s:"sessions", t:"bar"},
    {label:"평균 체류시간", val:fmtDur(k.avgDuration), cls:"", s:null},
    {label:"결제자수", val:k.payers||0, cls:"g", s:null},
    {label:"결제건수", val:k.payCount||0, cls:"g", s:"payCount", t:"bar"},
    {label:"결제금액", val:won(k.payAmount), cls:"a", s:"payAmount", t:"bar"},
    {label:"구독자수", val:k.subscribers||0, cls:"p", s:null},
    {label:"신규 가입", val:k.totalUsers||0, cls:"", s:"newUsers", t:"bar"}
  ];
  var kpiHtml=cards.map(function(c,i){
    var v=(typeof c.val==='number')?c.val.toLocaleString('ko-KR'):esc(c.val);
    var g=c.s?('<canvas class="spark" id="spark_'+i+'"></canvas>'):'<div class="nospark">—</div>';
    // 시계열이 있는 카드는 클릭하면 아래 상세 차트가 그 지표로 바뀜
    var extra=c.s?(' clickable" data-k="'+c.s+'" title="클릭하면 아래에서 상세 그래프로 보기'):'';
    return '<div class="k '+c.cls+extra+'"><div class="n">'+v+'</div><div class="l">'+c.label+'</div>'+g+'</div>';
  }).join("");

  var per=(j.perUser||[]);
  var maxS=per.reduce(function(m,u){return Math.max(m,u.sessions);},1);
  var perHtml=per.length?per.map(function(u){return '<tr><td>'+esc(u.user)+'</td><td class="r"><span class="bar"><span style="width:'+Math.round(u.sessions/maxS*100)+'%"></span></span>'+u.sessions+'</td></tr>';}).join(""):'<tr><td colspan="2" class="muted">데이터 없음</td></tr>';

  var ex=(j.exitPages||[]);
  var exTot=ex.reduce(function(a,e){return a+e.count;},0)||1;
  var exHtml=ex.length?ex.map(function(e){var pctv=Math.round(e.count/exTot*100);return '<tr><td>'+stageLabel(e.page)+'</td><td class="r"><span class="bar"><span style="width:'+pctv+'%;background:#dc2626"></span></span>'+e.count+' ('+pctv+'%)</td></tr>';}).join(""):'<tr><td colspan="2" class="muted">데이터 없음</td></tr>';

  var inq=(j.inquiries||[]);
  var inqOpen=inq.filter(function(q){return q.status!=='answered';}).length;
  function fmtDT(s){ if(!s) return '-'; try{ return new Date(s).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }catch(e){ return String(s).slice(0,16); } }
  var inqHtml=inq.length?inq.map(function(q){
    var body=(q.subject?('<b>'+esc(q.subject)+'</b> · '):'')+esc((q.message||'').slice(0,120))+((q.message||'').length>120?'…':'');
    var st=q.status==='answered'?'<span class="ok">답변완료</span>':'<span style="color:#d97706;font-weight:700">미처리</span>';
    return '<tr><td>'+fmtDT(q.created_at)+'</td><td>'+esc(q.email||'')+'</td><td>'+esc(q.category||'')+'</td><td style="white-space:normal;max-width:360px">'+body+'</td><td>'+st+'</td></tr>';
  }).join(""):'<tr><td colspan="5" class="muted" style="padding:16px">문의 없음</td></tr>';

  $("content").innerHTML=
    '<div class="grid">'+kpiHtml+'</div>'+
    '<div class="panel">'+
      '<div class="ch-h"><div><h3 id="chTitle">📈 상세 추이</h3><div class="ch-sub" id="chSub">최근 14일</div></div>'+
        '<div class="ch-stats" id="chStats"></div></div>'+
      '<div class="ch-chips" id="chChips"></div>'+
      '<div class="ch-canvas"><canvas id="mainChart"></canvas></div>'+
    '</div>'+
    '<div class="cols">'+
      '<div class="panel"><h3>👤 사용자별 세션 이용수 (상위 30)</h3><table><thead><tr><th>사용자</th><th class="r">세션수</th></tr></thead><tbody>'+perHtml+'</tbody></table></div>'+
      '<div class="panel"><h3>🚪 이탈 단계 (어디서 나갔나)</h3><table><thead><tr><th>단계</th><th class="r">이탈수</th></tr></thead><tbody>'+exHtml+'</tbody></table></div>'+
    '</div>'+
    '<div class="panel"><div class="cust-h">'+
      '<h3 class="fold-h" id="custToggle">🧾 고객 원장 ('+(j.customers||[]).length+'명) <span class="caret">▾</span><span class="fold-hint" id="custHint"></span></h3>'+
      '<div class="cust-tools" id="custTools"><input type="text" id="custSearch" placeholder="이메일·이름·번호 검색"><label class="cust-chk"><input type="checkbox" id="custMkt"> 마케팅 동의자만</label><button class="btn" id="custCsv" type="button">CSV 내보내기</button></div></div>'+
      '<div class="fold-body" id="custBody"><div class="cust-wrap scroll"><table class="ctab" id="custTable"></table></div></div></div>'+
    '<div class="panel"><h3>💬 문의 ('+(j.inquiries||[]).length+'건'+(inqOpen?' · 미처리 '+inqOpen+'건':'')+')</h3>'+
      '<div class="cust-wrap"><table class="ctab">'+
        '<thead><tr><th>날짜</th><th>이메일</th><th>분류</th><th>내용</th><th>상태</th></tr></thead><tbody>'+inqHtml+'</tbody></table></div></div>'+
    '<div class="panel"><h3>🎟 프로모션 코드 ('+(j.promos||[]).length+'개)</h3>'+
      '<div class="promo-form">'+
        '<div class="pf code"><label>코드</label><input id="pcCode" type="text" placeholder="WELCOME20"></div>'+
        '<div class="pf"><label>할인 방식</label><select id="pcType"><option value="percent">정률 %</option><option value="fixed">정액 원</option></select></div>'+
        '<div class="pf val"><label>할인값</label><input id="pcVal" type="number" min="0" placeholder="20"></div>'+
        '<div class="pf mx"><label>사용 한도</label><input id="pcMax" type="number" min="1" placeholder="무제한"></div>'+
        '<div class="pf exp"><label>만료일(선택)</label><input id="pcExp" type="date"></div>'+
        '<div class="pf note"><label>메모(선택)</label><input id="pcNote" type="text" placeholder="첫 가입 할인"></div>'+
        '<button class="btn p" id="pcAdd" type="button">+ 코드 생성</button>'+
      '</div>'+
      '<div class="pmsg" id="pcMsg"></div>'+
      '<div class="cust-wrap"><table class="ctab">'+
        '<thead><tr><th>코드</th><th>할인</th><th class="r">사용/한도</th><th>만료</th><th>메모</th><th>상태</th><th>관리</th></tr></thead><tbody>'+promoRows(j.promos||[])+'</tbody></table></div></div>';

  // 카드별 스파크라인
  sparks.forEach(function(c){try{c.destroy();}catch(e){}}); sparks=[];
  if(window.Chart){
    cards.forEach(function(c,i){
      if(!c.s) return;
      var el=document.getElementById('spark_'+i); if(!el) return;
      var data=S[c.s]||[], col=CARD_COLOR[c.cls]||"#64748b";
      sparks.push(new Chart(el,{type:c.t,data:{labels:sdays.map(function(d){return d.slice(5);}),datasets:[{data:data,borderColor:col,backgroundColor:c.t==='bar'?col:hexA(col,.14),borderWidth:2,pointRadius:0,tension:.35,fill:c.t==='line',borderRadius:c.t==='bar'?2:0,maxBarThickness:10}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{displayColors:false,callbacks:{title:function(it){return (sdays[it[0].dataIndex]||'').slice(5);},label:function(it){return (c.cls==='a'?won(it.raw):it.raw.toLocaleString('ko-KR'));}}}},scales:{x:{display:false},y:{display:false,beginAtZero:true}}}}));
    });
  }

  // 상세 추이 차트: 시계열 보관 후 선택된 지표로 그리기
  SERIES=S; SDAYS=sdays;
  Array.prototype.forEach.call(document.querySelectorAll('.k.clickable'),function(el){
    el.onclick=function(){ selectMetric(el.getAttribute('data-k')); };
  });
  renderChips(); drawMain();

  // 고객 원장
  CUST=j.customers||[];
  if($("custSearch")) $("custSearch").oninput=renderCustomers;
  if($("custMkt")) $("custMkt").onchange=renderCustomers;
  if($("custCsv")) $("custCsv").onclick=custCSV;
  renderCustomers();
  if($("custToggle")) $("custToggle").onclick=toggleCust;
  applyCustFold(custFoldClosed());   // 지난번 접힘/펼침 상태 복원

  if($("pcAdd")) $("pcAdd").onclick=createPromo;
}

/* ============================================================
   ===== 상세 추이 차트 (지표 선택형) =====
   위 KPI 카드를 누르거나 칩을 눌러 원하는 지표의 일자별 그래프를 봅니다.
   ============================================================ */
var SERIES={}, SDAYS=[], MAIN_CHART=null;
var METRICS=[
  {k:"visitors",  label:"방문자(순)", icon:"👣", color:"#3B6D11", type:"line", fmt:"num", unit:"명"},
  {k:"pageviews", label:"페이지뷰",   icon:"📄", color:"#5a9420", type:"line", fmt:"num", unit:"회"},
  {k:"sessions",  label:"훈련 세션",  icon:"🎯", color:"#4e9a2f", type:"bar",  fmt:"num", unit:"회"},
  {k:"newUsers",  label:"신규 가입",  icon:"🙌", color:"#2f7d6b", type:"bar",  fmt:"num", unit:"명"},
  {k:"payCount",  label:"결제건수",   icon:"🧾", color:"#c98a00", type:"bar",  fmt:"num", unit:"건"},
  {k:"payAmount", label:"결제금액",   icon:"💰", color:"#b45309", type:"bar",  fmt:"won", unit:""}
];
var CUR_METRIC=(function(){ try{ return localStorage.getItem('admin_metric')||'visitors'; }catch(e){ return 'visitors'; } })();
function metricOf(k){ for(var i=0;i<METRICS.length;i++){ if(METRICS[i].k===k) return METRICS[i]; } return METRICS[0]; }
function fmtMetric(m,v){ return m.fmt==='won' ? won(v) : ((+v||0).toLocaleString('ko-KR')+(m.unit||'')); }
function renderChips(){
  var el=$("chChips"); if(!el) return;
  el.innerHTML=METRICS.map(function(m){
    return '<button class="chchip'+(m.k===CUR_METRIC?' on':'')+'" data-k="'+m.k+'" type="button"><i style="background:'+m.color+'"></i>'+m.icon+' '+m.label+'</button>';
  }).join('');
  Array.prototype.forEach.call(el.querySelectorAll('.chchip'),function(b){
    b.onclick=function(){ selectMetric(b.getAttribute('data-k')); };
  });
  // 선택된 카드 강조
  Array.prototype.forEach.call(document.querySelectorAll('.k.clickable'),function(c){
    c.classList.toggle('sel', c.getAttribute('data-k')===CUR_METRIC);
  });
}
function selectMetric(k){
  if(!k) return;
  CUR_METRIC=k; try{ localStorage.setItem('admin_metric',k); }catch(e){}
  renderChips(); drawMain();
  var chip=document.querySelector('.chchip.on'); if(chip && chip.scrollIntoView){ try{ chip.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'}); }catch(e){} }
}
function drawMain(){
  var el=document.getElementById("mainChart"); if(!el || !window.Chart) return;
  var m=metricOf(CUR_METRIC);
  var data=(SERIES[m.k]||[]).map(function(v){return +v||0;});
  var days=SDAYS||[];
  // 요약 통계: 합계 · 일평균 · 최고 · 최근 절반 vs 직전 절반 증감
  var total=data.reduce(function(a,b){return a+b;},0);
  var avg=data.length?Math.round(total/data.length):0;
  var peak=data.length?Math.max.apply(null,data):0;
  var half=Math.floor(data.length/2);
  var prevSum=data.slice(0,half).reduce(function(a,b){return a+b;},0);
  var recentSum=data.slice(half).reduce(function(a,b){return a+b;},0);
  var delta=prevSum?Math.round((recentSum-prevSum)/prevSum*100):(recentSum?100:0);
  var dCls=delta>0?'up':(delta<0?'down':'');
  var dTxt=(delta>0?'▲ ':(delta<0?'▼ ':''))+Math.abs(delta)+'%';
  var t=$("chTitle"); if(t) t.textContent=m.icon+' '+m.label+' 추이';
  var s=$("chSub"); if(s) s.textContent='최근 '+days.length+'일 · 카드나 아래 버튼으로 지표를 바꿔보세요';
  var st=$("chStats");
  if(st) st.innerHTML=
    '<div class="ch-st"><div class="sv">'+fmtMetric(m,total)+'</div><div class="sl">합계</div></div>'+
    '<div class="ch-st"><div class="sv">'+fmtMetric(m,avg)+'</div><div class="sl">일평균</div></div>'+
    '<div class="ch-st"><div class="sv">'+fmtMetric(m,peak)+'</div><div class="sl">최고</div></div>'+
    '<div class="ch-st '+dCls+'"><div class="sv">'+dTxt+'</div><div class="sl">최근 7일 추세</div></div>';
  if(MAIN_CHART){ try{ MAIN_CHART.destroy(); }catch(e){} MAIN_CHART=null; }
  var ctx=el.getContext('2d');
  var grad=ctx.createLinearGradient(0,0,0,el.clientHeight||260);
  grad.addColorStop(0,hexA(m.color,.34)); grad.addColorStop(1,hexA(m.color,.02));
  var isLine=(m.type==='line');
  MAIN_CHART=new Chart(el,{
    type:m.type,
    data:{ labels:days.map(function(d){ return d.slice(5).replace('-','/'); }),
      datasets:[{ label:m.label, data:data,
        borderColor:m.color, backgroundColor:isLine?grad:m.color,
        borderWidth:isLine?2.5:0, fill:isLine, tension:.38,
        pointRadius:0, pointHoverRadius:5, pointHoverBackgroundColor:m.color, pointHoverBorderColor:'#fff', pointHoverBorderWidth:2,
        borderRadius:isLine?0:7, maxBarThickness:36, hoverBackgroundColor:isLine?grad:hexA(m.color,.85) }]},
    options:{ responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      animation:{duration:420},
      layout:{padding:{top:6}},
      plugins:{ legend:{display:false},
        tooltip:{ displayColors:false, backgroundColor:'rgba(31,36,48,.94)', padding:11, cornerRadius:9,
          titleFont:{size:11.5,weight:'600'}, titleColor:'#c8d3bb', bodyFont:{size:14,weight:'800'},
          callbacks:{ title:function(it){ return days[it[0].dataIndex]||''; }, label:function(it){ return fmtMetric(m,it.raw); } } } },
      scales:{
        x:{ grid:{display:false}, border:{display:false},
            ticks:{color:'#9aa3b2',font:{size:11},maxRotation:0,autoSkip:true,maxTicksLimit:7} },
        y:{ beginAtZero:true, border:{display:false},
            grid:{color:'#eef1ea',drawTicks:false},
            ticks:{color:'#9aa3b2',font:{size:11},padding:8,maxTicksLimit:5,
              callback:function(v){ if(m.fmt==='won'){ return v>=10000?((v/10000).toLocaleString('ko-KR')+'만'):v.toLocaleString('ko-KR'); } return (+v).toLocaleString('ko-KR'); }} }
      }}
  });
}
/* ===== 고객 원장 접기/펼치기 (상태는 브라우저에 기억) ===== */
function custFoldClosed(){ try{ return localStorage.getItem('admin_fold_cust')==='1'; }catch(e){ return false; } }
function applyCustFold(closed){
  var h=$("custToggle"), b=$("custBody"), t=$("custTools"), hint=$("custHint");
  if(h) h.classList.toggle('closed',closed);
  if(b) b.classList.toggle('closed',closed);
  if(t) t.style.display=closed?'none':'';
  if(hint) hint.textContent=closed?'· 펼쳐서 보기':'';
  try{ localStorage.setItem('admin_fold_cust',closed?'1':'0'); }catch(e){}
}
function toggleCust(){ var b=$("custBody"); if(!b) return; applyCustFold(!b.classList.contains('closed')); }

/* ===== 프로모션 코드 ===== */
function promoRows(list){
  if(!list.length) return '<tr><td colspan="7" class="muted" style="padding:16px">등록된 코드가 없습니다. 위에서 생성하세요.</td></tr>';
  return list.map(function(p){
    var disc=p.discount_type==='percent'?(p.discount_value+'%'):(Number(p.discount_value).toLocaleString('ko-KR')+'원');
    var use=(p.used_count||0)+' / '+(p.max_uses==null?'∞':p.max_uses);
    var exp=p.expires_at?fmtD(p.expires_at):'무기한';
    var tag=p.active?'<span class="ptag on">사용중</span>':'<span class="ptag off">중지</span>';
    var toggle='<span class="plink" onclick="togglePromo('+p.id+','+(p.active?'false':'true')+')">'+(p.active?'중지':'재개')+'</span>';
    var del=' · <span class="plink del" onclick="deletePromo('+p.id+')">삭제</span>';
    return '<tr><td><b>'+esc(p.code)+'</b></td><td>'+disc+'</td><td class="r">'+use+'</td><td>'+exp+'</td><td>'+esc(p.note||'')+'</td><td>'+tag+'</td><td>'+toggle+del+'</td></tr>';
  }).join("");
}
function pcMsg(m,ok){ var e=$("pcMsg"); if(!e) return; e.textContent=m||''; e.className='pmsg'+(m?(ok?' ok':' err'):''); }
async function promoAction(payload){
  var sess=(await sb.auth.getSession()).data.session;
  var r=await fetch(PROMO_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(Object.assign({accessToken:sess&&sess.access_token},payload))});
  var j=await r.json().catch(function(){return{};});
  return {ok:r.ok&&j.ok, j:j};
}
async function createPromo(){
  var code=($("pcCode").value||'').trim();
  var val=$("pcVal").value;
  if(!code){ pcMsg('코드를 입력하세요.'); return; }
  if(val===''||Number(val)<0){ pcMsg('할인값을 입력하세요.'); return; }
  var b=$("pcAdd"); b.disabled=true; pcMsg('생성 중…');
  var res=await promoAction({action:'create',code:code,discount_type:$("pcType").value,discount_value:Number(val),max_uses:$("pcMax").value,expires_at:$("pcExp").value,note:$("pcNote").value});
  b.disabled=false;
  if(res.ok){ pcMsg('✓ 코드가 생성됐어요.',true); loadStats(); }
  else{ pcMsg(res.j.error==='code_exists'?'이미 있는 코드예요.':'생성 실패: '+(res.j.error||'오류')); }
}
async function togglePromo(id,active){
  var res=await promoAction({action:'toggle',id:id,active:active});
  if(res.ok) loadStats(); else alert('변경 실패: '+(res.j.error||'오류'));
}
async function deletePromo(id){
  if(!confirm('이 코드를 삭제할까요? (이미 사용된 결제 기록은 유지됩니다)')) return;
  var res=await promoAction({action:'delete',id:id});
  if(res.ok) loadStats(); else alert('삭제 실패: '+(res.j.error||'오류'));
}

function provLabel(p){ return p==='kakao'?'카카오':p==='google'?'구글':'이메일'; }
function fmtD(s){ if(!s) return '-'; try{ return new Date(s).toLocaleDateString('ko-KR'); }catch(e){ return String(s).slice(0,10); } }
function custFiltered(){
  var q=(($("custSearch")&&$("custSearch").value)||'').trim().toLowerCase();
  var onlyMkt=$("custMkt")&&$("custMkt").checked;
  return CUST.filter(function(c){
    if(onlyMkt && !c.marketing) return false;
    if(!q) return true;
    return ((c.email||'')+' '+(c.name||'')+' '+(c.phone||'')).toLowerCase().indexOf(q)>=0;
  });
}
function renderCustomers(){
  var t=$("custTable"); if(!t) return;
  var rows=custFiltered();
  var head='<thead><tr><th>이메일</th><th>이름</th><th>가입경로</th><th>가입일</th><th>휴대폰</th><th>마케팅</th><th>구독</th><th class="r">세션</th><th>최근활동</th></tr></thead>';
  var body=rows.length?rows.map(function(c){
    return '<tr><td>'+esc(c.email)+'</td><td>'+esc(c.name)+'</td><td>'+provLabel(c.provider)+'</td><td>'+fmtD(c.joined)+'</td>'+
      '<td>'+(c.phone?esc(c.phone):'<span class="muted">미인증</span>')+'</td>'+
      '<td>'+(c.marketing?'<span class="ok">동의</span>':'<span class="muted">-</span>')+'</td>'+
      '<td>'+esc(c.sub)+'</td><td class="r">'+(c.sessions||0)+'</td><td>'+fmtD(c.lastActive)+'</td></tr>';
  }).join(''):'<tr><td colspan="9" class="muted" style="padding:16px">해당 고객이 없습니다.</td></tr>';
  t.innerHTML=head+'<tbody>'+body+'</tbody>';
}
function csvCell(v){ v=String(v==null?'':v); return /[",\n]/.test(v)?('"'+v.replace(/"/g,'""')+'"'):v; }
function custCSV(){
  var rows=custFiltered();
  var header=['이메일','이름','가입경로','가입일','휴대폰','마케팅동의','구독','세션수','최근활동'];
  var lines=[header.join(',')].concat(rows.map(function(c){
    return [c.email,c.name,provLabel(c.provider),fmtD(c.joined),c.phone||'',c.marketing?'동의':'',c.sub,c.sessions||0,fmtD(c.lastActive)].map(csvCell).join(',');
  }));
  var blob=new Blob(['﻿'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='customers_'+new Date().toISOString().slice(0,10)+'.csv'; document.body.appendChild(a); a.click(); a.remove();
}

/* ---- auth ---- */
function showGate(){ $("gate").classList.remove("hide"); }
function hideGate(){ $("gate").classList.add("hide"); }
$("loginBtn").onclick=async function(){
  var e=$("email").value.trim(), p=$("pw").value; if(!e||!p){ $("gmsg").textContent="이메일과 비밀번호를 입력하세요."; return; }
  $("loginBtn").disabled=true;
  var r=await sb.auth.signInWithPassword({email:e,password:p});
  $("loginBtn").disabled=false;
  if(r.error){ $("gmsg").textContent=r.error.message; return; }
  onAuthed(r.data.user);
};
$("pw").addEventListener("keydown",function(e){ if(e.key==="Enter") $("loginBtn").click(); });
$("logout").onclick=async function(){ await sb.auth.signOut(); location.reload(); };
$("reload").onclick=loadStats;

function onAuthed(user){ $("who").textContent=user.email||""; hideGate(); loadStats(); }

sb.auth.getSession().then(function(res){ if(res.data&&res.data.session){ onAuthed(res.data.session.user); } else { showGate(); } });
</script>
